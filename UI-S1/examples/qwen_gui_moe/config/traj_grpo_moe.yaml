# MoE (Mixture of Experts) GUI Agent Training Configuration
#
# This configuration extends the base GRPO training with MoE support:
# - 4 Expert LoRAs (click, type, navigate, scroll)
# - Text-only Router for instruction-based expert selection
# - Load balance loss to prevent expert collapse
#
# Usage:
#   python -m verl.trainer.main_dapo --config examples/qwen_gui_moe/config/traj_grpo_moe.yaml

hydra:
  searchpath:
    - file:///scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# ============================================================================
# Data Configuration
# ============================================================================
data:
  # Maximum sequence lengths
  max_prompt_length: 8192
  max_response_length: 1024

  # Batch size for training (number of trajectories per batch)
  train_batch_size: 4

  # Data processing
  return_raw_chat: False
  filter_overlong_prompts: True
  reward_fn_key: data_source

  # Custom dataset class for trajectory data
  custom_cls:
    path: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/utils/dataset/rl_dataset.py
    name: TrajDataset

  # Data files (update these paths for your data)
  train_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/datasets/ui_s1_train.jsonl
  val_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/datasets/ui_s1_val.jsonl

# ============================================================================
# Model Configuration (Actor + Rollout + Reference)
# ============================================================================
actor_rollout_ref:
  model:
    # Base model path
    path: Qwen/Qwen2.5-VL-7B-Instruct

    # Model settings
    trust_remote_code: true
    enable_gradient_checkpointing: true

    # ============================================================================
    # MoE Configuration - NEW (Conservative settings to prevent collapse)
    # ============================================================================
    moe:
      # Enable MoE training
      enabled: true

      # Number of expert LoRAs (4 for click/type/navigate/scroll)
      num_experts: 4

      # Top-k experts to select per sample
      # CHANGED: 1 → 2 for soft routing (more stable gradients)
      top_k: 2

      # Expert LoRA settings
      # Total MoE params ≈ Single LoRA with rank=64 for fair comparison
      expert_lora_r: 16
      expert_lora_alpha: 32
      expert_lora_dropout: 0.05

      # Which modules to apply LoRA
      target_modules:
        - q_proj
        - v_proj

      # Router settings
      router_hidden: 256
      router_dropout: 0.1
      # CHANGED: 1.0 → 0.5 for more confident routing decisions
      router_temperature: 0.5

      # Feature extraction from instruction
      pooling_strategy: mean  # mean, last, first, max

      # Load balance loss weight
      # CHANGED: 0.1 → 0.2 to better prevent expert collapse
      balance_weight: 0.2
      balance_type: mse  # mse, switch, entropy

      # Z-loss for training stability
      # CHANGED: 0.0 → 0.01 to stabilize router logits (critical for MoE!)
      z_loss_weight: 0.01

      # Training settings
      # CHANGED: false → true for soft routing with weighted expert combination
      use_vectorized_routing: true
      freeze_router_epochs: 0  # optionally freeze router initially

      # Logging settings
      log_routing_matrix_freq: 100  # log routing matrix every N steps

  # Actor training settings (Conservative settings to prevent collapse)
  actor:
    strategy: fsdp

    # PPO/GRPO batch settings
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 2

    # Optimizer
    optim:
      # CHANGED: 1e-4 → 1e-5 for more stable updates
      lr: 1e-5
      weight_decay: 0.01
      lr_warmup_steps_ratio: 0.1

    # PPO settings
    ppo_epochs: 1
    # CHANGED: 1.0 → 0.5 for stricter gradient clipping
    grad_clip: 0.5
    # CHANGED: 0.2 → 0.1 for more conservative policy updates
    clip_ratio: 0.1

    # Loss settings (GRPO-style)
    use_kl_loss: true
    # CHANGED: 0.001 → 0.1 to strongly penalize KL divergence (10x increase)
    kl_loss_coef: 0.1
    kl_loss_type: low_var_kl
    loss_agg_mode: token-mean

    # FSDP settings
    fsdp_config:
      param_offload: false
      optimizer_offload: false
      fsdp_size: -1

  # Rollout settings (vLLM)
  rollout:
    name: vllm
    mode: sync

    # Generation settings
    temperature: 1.0
    top_p: 1.0
    do_sample: true

    # Rollout parallelism
    n: 4  # number of samples per prompt for GRPO

    # vLLM settings
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.5
    max_num_batched_tokens: 32768
    enforce_eager: true
    free_cache_engine: true
    load_format: dummy_dtensor

    # Validation settings
    val_kwargs:
      temperature: 0
      do_sample: false
      n: 1

  # Reference policy (for KL computation)
  ref:
    strategy: fsdp
    fsdp_config:
      param_offload: true  # offload to save memory

# ============================================================================
# Algorithm Configuration
# ============================================================================
algorithm:
  # GRPO advantage estimator
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: true

  # Discount factors
  gamma: 1.0
  lam: 1.0

  # KL penalty
  use_kl_in_reward: false
  kl_penalty: kl

  # UI-S1 specific settings
  patch_threshold: 0
  hint: false
  actions_only: null

  uis1:
    episode_advantage_w: 1.0
    step_advantage_w: 1.0
    mode: mean_norm

  # DAPO filtering
  filter_groups:
    enable: true
    max_num_gen_batches: 10
    metric: seq_final_reward
    std_threshold: 0.1

# ============================================================================
# Trainer Configuration
# ============================================================================
trainer:
  # Use MoE trainer class
  # trainer_class: verl.trainer.ppo.moe_dapo_trainer.MoERayTrajDAPOTrainer

  # Training settings
  total_epochs: 10
  balance_batch: true

  # Experiment tracking
  project_name: gui_traj_grpo_moe
  experiment_name: moe_4experts_r16_conservative_topk2
  logger:
    - console
    - wandb

  # Checkpointing
  save_freq: 500
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}

  # Validation
  val_before_train: true
  test_freq: 100

  # Resources
  nnodes: 1
  n_gpus_per_node: 8

# ============================================================================
# Reward Model Configuration
# ============================================================================
reward_model:
  enable: false
  reward_manager: naive

# ============================================================================
# Custom Reward Function
# ============================================================================
# Using default_compute_score which dispatches based on data_source
# (android_control, gui_traj_action_match, etc.)
# Uncomment and modify if you need a custom reward function
# custom_reward_function:
#   path: /path/to/custom_reward.py
#   name: compute_score

# ============================================================================
# Ray Configuration
# ============================================================================
# NOTE: Do not set ray_init.num_cpus when using multi-node training with
# manually started Ray cluster, as it conflicts with connecting to existing cluster
# ray_init:
#   num_cpus: 64
