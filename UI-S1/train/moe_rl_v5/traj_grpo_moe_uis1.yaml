# UI-S1 MoE RL Training with Random-Init LoRA Experts (Soft Routing)
#
# Key design from GUI-360 MoE SUMMARY:
#   - Soft routing: top_k=4 (all experts, continuous weights)
#   - r=32, alpha=64, all 7 target modules
#   - balance_weight=0.2, z_loss=0.01 for routing stability
#   - entropy_coeff=0.01 to prevent entropy explosion (old run collapsed without this)
#   - Random init (no SVD warm-start) — UI-S1 SFT too weak for SVD extraction
#   - KL coef=0.1 — random init is close to base, need stronger KL
#   - 8 nodes (32 GPUs) — 1K trajectories is small
#
# Fixes vs old collapsed run (moe_4experts_r16_conservative_topk4_FIX):
#   - r=32 (was 16) — more capacity
#   - 7 modules (was 2: q,v) — broader expressivity
#   - entropy_coeff=0.01 (was 0.0) — prevents entropy explosion that caused collapse
#   - micro_batch=2 (was 1) — r=32 still fits in memory
#
# Usage:
#   python -m verl.trainer.main_dapo \
#     --config-path=train/moe_rl_v5 \
#     --config-name=traj_grpo_moe_uis1

hydra:
  searchpath:
    - file:///scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# ============================================================================
# Data Configuration (UI-S1 / AndroidControl)
# ============================================================================
data:
  max_prompt_length: 8192
  max_response_length: 512

  train_batch_size: 8

  return_raw_chat: False
  filter_overlong_prompts: True
  reward_fn_key: data_source

  custom_cls:
    path: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/utils/dataset/rl_dataset.py
    name: TrajDataset

  train_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/datasets/ui_s1_dataset/ui_s1_train.jsonl
  val_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/evaluation/dataset/android_control_evaluation_std.jsonl

# ============================================================================
# Model Configuration (Actor + Rollout + Reference)
# ============================================================================
actor_rollout_ref:
  model:
    path: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/checkpoints/Qwen2.5-VL-7B-Instruct
    trust_remote_code: true
    enable_gradient_checkpointing: true
    use_remove_padding: true

    # ========================================================================
    # MoE Configuration — Random Init, r=32, Soft Routing (all experts)
    # ========================================================================
    moe:
      enabled: true
      num_experts: 4
      top_k: 4                    # Soft routing: use all 4 experts with continuous weights

      # Random-init LoRA experts (no moe_checkpoint)
      expert_lora_r: 32
      expert_lora_alpha: 64
      expert_lora_dropout: 0.05

      # All 7 modules (from GUI-360 v5)
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - gate_proj
        - up_proj
        - down_proj

      # Router
      router_hidden: 256
      router_temperature: 0.5

      pooling_strategy: mean

      # Balance / stability losses
      balance_weight: 0.2
      balance_type: mse
      z_loss_weight: 0.01

      use_vectorized_routing: true
      freeze_router_epochs: 0

      # No moe_checkpoint — random initialization

      log_routing_matrix_freq: 100

  # Actor training settings
  actor:
    strategy: fsdp

    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 1

    optim:
      lr: 1e-5
      weight_decay: 0.01
      lr_warmup_steps_ratio: 0.1

    ppo_epochs: 1
    grad_clip: 0.5
    clip_ratio: 0.1

    use_kl_loss: true
    kl_loss_coef: 0.1
    kl_loss_type: low_var_kl
    entropy_coeff: 0.01
    loss_agg_mode: token-mean

    use_torch_compile: false

    fsdp_config:
      param_offload: false
      optimizer_offload: false
      fsdp_size: -1

    checkpoint:
      contents:
        - model
        - hf_model
        - optimizer
        - extra

  # Rollout settings (vLLM)
  rollout:
    name: vllm
    mode: sync

    temperature: 1.0
    top_p: 1.0
    do_sample: true

    n: 4

    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.7
    max_model_len: 16384
    max_num_batched_tokens: 32768
    enforce_eager: true
    free_cache_engine: true
    load_format: dummy_dtensor
    enable_chunked_prefill: false
    limit_images: 2

    log_prob_micro_batch_size_per_gpu: 1

    val_kwargs:
      temperature: 0
      do_sample: false
      n: 1

  # Reference policy
  ref:
    strategy: fsdp
    log_prob_micro_batch_size_per_gpu: 1
    fsdp_config:
      param_offload: false

# ============================================================================
# Algorithm Configuration
# ============================================================================
algorithm:
  adv_estimator: uis1
  norm_adv_by_std_in_grpo: true

  gamma: 0.5
  lam: 1.0

  use_kl_in_reward: false
  kl_penalty: kl

  patch_threshold: 2
  hint: false
  actions_only: null

  uis1:
    episode_advantage_w: 1.0
    step_advantage_w: 1.0
    mode: mean_std_norm

  filter_groups:
    enable: false
    max_num_gen_batches: 10
    metric: seq_future_reward
    std_threshold: 0.3

# ============================================================================
# Trainer Configuration
# ============================================================================
trainer:
  total_epochs: 5
  balance_batch: true

  project_name: ui_s1_moe_rl
  experiment_name: moe_4exp_r32_topk4_soft_randinit
  logger:
    - console
    - wandb

  save_freq: 10
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}

  # HuggingFace upload (MoE parts only, ~100MB per checkpoint)
  hf_repo_id: Stevenshuqing/ui-s1-moe-rl
  hf_private: true

  val_before_train: false
  test_freq: 10
  critic_warmup: 0

  nnodes: 8
  n_gpus_per_node: 4

# ============================================================================
# Reward Model Configuration
# ============================================================================
reward_model:
  enable: false
  reward_manager: naive
