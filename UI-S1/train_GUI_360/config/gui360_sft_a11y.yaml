hydra:
  searchpath:
    - file:///scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/trainer/config

defaults:
  - sft_trainer
  - _self_

# ============================================
# GUI-360 SFT Configuration with A11y Support
# ============================================
# This config uses accessibility information (SoM labels + element list)
# which significantly improves grounding accuracy (from ~50% to ~82%)
# ============================================

# Data configuration
data:
  train_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/train_GUI_360/data/gui360_train_sft_a11y.parquet
  val_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/train_GUI_360/data/gui360_eval_sft_a11y.parquet
  train_batch_size: 64
  micro_batch_size_per_gpu: 1
  max_length: 8192
  truncation: error
  balance_dp_token: False
  multiturn:
    enable: true
    messages_key: messages
    tools_key: tools
    enable_thinking_key: enable_thinking
  custom_cls:
    path: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/utils/dataset/gui_multiturn_sft_dataset.py
    name: GUIMultiTurnSFTDataset
  trust_remote_code: true

# Model configuration - Full fine-tuning with FSDP
model:
  partial_pretrain: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/checkpoints/Qwen2.5-VL-7B-Instruct
  strategy: fsdp2
  fsdp_config:
    model_dtype: fp32
    wrap_policy:
      min_num_params: 0
    cpu_offload: False
    offload_params: False
  enable_gradient_checkpointing: True
  trust_remote_code: True
  lora_rank: 0  # Full fine-tuning
  lora_alpha: 16
  target_modules: all-linear
  use_liger: False
  external_lib: null
  use_shm: False

# Optimizer configuration
optim:
  lr: 1e-5  # Paper uses {1e-5, 5e-6, 1e-6}, start with 1e-5
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_steps_ratio: 0.05
  clip_grad: 0.5
  lr_scheduler: cosine

# Training configuration
trainer:
  default_local_dir: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/train_GUI_360/checkpoints
  default_hdfs_dir: null
  resume_path: null
  project_name: gui360-sft-a11y
  experiment_name: gui360_sft_a11y_qwenvl
  total_epochs: 3  # Paper likely uses fewer epochs with a11y
  total_training_steps: null
  logger: ['console', 'wandb']
  seed: 42
  save_freq: 1590
  test_freq: 397
  nnodes: 4
  n_gpus_per_node: 4
  max_ckpt_to_keep: 5

# Sequence parallelism
ulysses_sequence_parallel_size: 1
use_remove_padding: False
