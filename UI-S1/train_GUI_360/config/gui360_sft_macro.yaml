hydra:
  searchpath:
    - file:///scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/trainer/config

defaults:
  - sft_trainer
  - _self_

# ============================================
# GUI-360 SFT Configuration — Macro-Augmented
# ============================================
# Key features:
# 1. All features from v4 (A11y + Thinking)
# 2. Macro tool-use: navigate_to_dialog, switch_ui_mode, navigate_and_return
# 3. Mixed data: original SFT (105K) + upsampled macro-augmented (~7.7K, ~7%)
#
# Purpose:
# Train the model to recognize bottleneck-crossing situations and call macro
# tools instead of attempting multi-step navigation sequences. This reduces
# the effective decision horizon from ~15 steps to ~4-5 steps on hard tasks.
#
# Data:
# - macro_mixed_train.parquet: baseline data + 10x upsampled macro data
# - macro_mixed_eval.parquet: baseline eval + 10% macro samples
#
# Training strategy:
# Continue training from the v4 A11y+Thinking checkpoint with lower LR.
# The macro samples make up ~7% of training data to teach macro tool usage
# without forgetting existing capabilities.

# Data configuration
data:
  train_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/outputs/macro_sft/macro_mixed_train.parquet
  val_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/outputs/macro_sft/macro_mixed_eval.parquet
  train_batch_size: 256
  micro_batch_size_per_gpu: 1
  max_length: 16384
  truncation: error
  balance_dp_token: False
  multiturn:
    enable: true
    messages_key: messages
    tools_key: tools
    enable_thinking_key: enable_thinking
  custom_cls:
    path: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/utils/dataset/gui_multiturn_sft_dataset.py
    name: GUIMultiTurnSFTDataset
  trust_remote_code: true

# Model configuration
# Continue from v4 checkpoint (A11y+Thinking), or use base model
model:
  # Option A: Continue from v4 checkpoint (recommended)
  # partial_pretrain: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/train_GUI_360/checkpoints/gui360_sft_v4_a11y_thinking/global_step_XXX
  # Option B: Train from base model
  partial_pretrain: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/checkpoints/Qwen2.5-VL-7B-Instruct
  strategy: fsdp2
  fsdp_config:
    model_dtype: fp32
    wrap_policy:
      min_num_params: 0
    cpu_offload: False
    offload_params: False
  enable_gradient_checkpointing: True
  trust_remote_code: True
  lora_rank: 0
  lora_alpha: 16
  target_modules: all-linear
  use_liger: False
  external_lib: null
  use_shm: False

# Optimizer configuration
# Lower LR for continue-training to avoid catastrophic forgetting
optim:
  lr: 5e-6
  betas: [0.9, 0.95]
  weight_decay: 0.2
  warmup_steps_ratio: 0.05
  clip_grad: 0.5
  lr_scheduler: cosine

# Training configuration
trainer:
  default_local_dir: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/train_GUI_360/checkpoints/gui360_sft_macro
  default_hdfs_dir: null
  resume_path: null
  project_name: gui360-sft
  experiment_name: gui360_sft_macro
  total_epochs: 2
  total_training_steps: null
  logger: ['console', 'wandb']
  seed: 42
  save_freq: 25
  test_freq: 25
  nnodes: 4
  n_gpus_per_node: 4
  max_ckpt_to_keep: 15

# Sequence parallelism
ulysses_sequence_parallel_size: 1
use_remove_padding: False
