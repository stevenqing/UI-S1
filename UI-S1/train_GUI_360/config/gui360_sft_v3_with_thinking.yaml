hydra:
  searchpath:
    - file:///scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/trainer/config

defaults:
  - sft_trainer
  - _self_

# ============================================
# GUI-360 SFT Configuration v3 - With Thinking
# ============================================
# Key changes from v2:
# - Training data includes reasoning/thinking from raw JSONL
# - enable_thinking column set to True for all samples
# - Expected to reduce catastrophic forgetting of output format
# - More frequent checkpointing for early stopping analysis
#
# Data format change:
#   Old: <tool_call>{...}</tool_call>
#   New: Reasoning: {thought}\n\n<tool_call>{...}</tool_call>
#
# Reference: train_GUI_360/data_preparation/ENABLE_THINKING_GUIDE.md

# Data configuration
data:
  train_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/train_GUI_360/data/gui360_train_sft_with_thinking.parquet
  val_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/train_GUI_360/data/gui360_test_sft_with_thinking.parquet
  train_batch_size: 256
  micro_batch_size_per_gpu: 1
  max_length: 8192
  truncation: error
  balance_dp_token: False
  multiturn:
    enable: true
    messages_key: messages
    tools_key: tools
    enable_thinking_key: enable_thinking
  custom_cls:
    path: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/utils/dataset/gui_multiturn_sft_dataset.py
    name: GUIMultiTurnSFTDataset
  trust_remote_code: true

# Model configuration - Full fine-tuning with FSDP
model:
  partial_pretrain: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/checkpoints/Qwen2.5-VL-7B-Instruct
  strategy: fsdp2
  fsdp_config:
    model_dtype: fp32
    wrap_policy:
      min_num_params: 0
    cpu_offload: False
    offload_params: False
  enable_gradient_checkpointing: True
  trust_remote_code: True
  lora_rank: 0
  lora_alpha: 16
  target_modules: all-linear
  use_liger: False
  external_lib: null
  use_shm: False

# Optimizer configuration - Same as v2
optim:
  lr: 1e-6
  betas: [0.9, 0.95]
  weight_decay: 0.2
  warmup_steps_ratio: 0.05
  clip_grad: 0.5
  lr_scheduler: cosine

# Training configuration
# - More frequent saves for early stopping analysis
# - Based on v2 results, best checkpoint was around step 39
trainer:
  default_local_dir: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/train_GUI_360/checkpoints/gui360_sft_v3_with_thinking
  default_hdfs_dir: null
  resume_path: null
  project_name: gui360-sft
  experiment_name: gui360_sft_v3_thinking
  total_epochs: 2
  total_training_steps: null
  logger: ['console', 'wandb']
  seed: 42
  save_freq: 25
  test_freq: 25
  nnodes: 4
  n_gpus_per_node: 4
  max_ckpt_to_keep: 10

# Sequence parallelism
ulysses_sequence_parallel_size: 1
use_remove_padding: False
