hydra:
  searchpath:
    - file:///scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/trainer/config

defaults:
  - sft_trainer
  - _self_

# ============================================
# GUI-360 SFT Configuration V4 - A11y + Thinking
# ============================================
# Key features:
# 1. A11y support: SoM annotated screenshots, element list, element_id actions
# 2. Thinking traces: Reasoning from raw trajectory data
# 3. Combined benefits of both approaches
#
# Expected improvements:
# - Grounding: 35% -> ~80% (from A11y)
# - Action prediction: Better format retention (from thinking)
#
# Changes from v3:
# - Uses annotated screenshots with SoM labels
# - Includes element list in prompt
# - Actions use element_id instead of coordinates
# - Lower LR (1e-6) based on v3 early stopping analysis
#
# Reference: GUI-360 paper Table 3 (A11y ablation)

# Data configuration
data:
  train_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/train_GUI_360/data/gui360_train_sft_a11y_thinking.parquet
  val_files: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/train_GUI_360/data/gui360_eval_sft_a11y_thinking.parquet
  train_batch_size: 256
  micro_batch_size_per_gpu: 1
  max_length: 16384  # Increased to handle longest sequences (max observed: 12447)
  truncation: error
  balance_dp_token: False
  multiturn:
    enable: true
    messages_key: messages
    tools_key: tools
    enable_thinking_key: enable_thinking
  custom_cls:
    path: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/verl/utils/dataset/gui_multiturn_sft_dataset.py
    name: GUIMultiTurnSFTDataset
  trust_remote_code: true

# Model configuration - Full fine-tuning with FSDP
model:
  partial_pretrain: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/checkpoints/Qwen2.5-VL-7B-Instruct
  strategy: fsdp2
  fsdp_config:
    model_dtype: fp32
    wrap_policy:
      min_num_params: 0
    cpu_offload: False
    offload_params: False
  enable_gradient_checkpointing: True
  trust_remote_code: True
  lora_rank: 0
  lora_alpha: 16
  target_modules: all-linear
  use_liger: False
  external_lib: null
  use_shm: False

# Optimizer configuration
# Lower LR based on v3 analysis - early checkpoints performed better
optim:
  lr: 1e-6
  betas: [0.9, 0.95]
  weight_decay: 0.2
  warmup_steps_ratio: 0.05
  clip_grad: 0.5
  lr_scheduler: cosine

# Training configuration
# - More frequent saves for early stopping
# - Based on v3 results, best checkpoint was at step 25
trainer:
  default_local_dir: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/train_GUI_360/checkpoints/gui360_sft_v4_a11y_thinking
  default_hdfs_dir: null
  resume_path: null  # Start fresh with DCP checkpoints
  project_name: gui360-sft
  experiment_name: gui360_sft_v4_a11y_thinking
  total_epochs: 2
  total_training_steps: null
  logger: ['console', 'wandb']
  seed: 42
  save_freq: 25
  test_freq: 25
  nnodes: 4
  n_gpus_per_node: 4
  max_ckpt_to_keep: 15

# Sequence parallelism
ulysses_sequence_parallel_size: 1
use_remove_padding: False
