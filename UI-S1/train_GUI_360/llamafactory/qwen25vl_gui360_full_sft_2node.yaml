### model
model_name_or_path: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/checkpoints/Qwen2.5-VL-7B-Instruct
image_max_pixels: 1003520
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: false
freeze_language_model: false
deepspeed: train_GUI_360/llamafactory/ds_z3_config.json

### dataset
dataset: gui360_train
dataset_dir: train_GUI_360/llamafactory/data
template: qwen2_vl
cutoff_len: 8192
preprocessing_num_workers: 4
dataloader_num_workers: 0

### output
output_dir: train_GUI_360/llamafactory/output/gui360_full_sft_v2
logging_steps: 10
save_steps: 100
save_total_limit: 5
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: gui360_full_sft_v2

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 32
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
eval_dataset: gui360_val
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
