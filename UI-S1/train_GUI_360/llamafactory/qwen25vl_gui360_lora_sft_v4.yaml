### model
model_name_or_path: /scratch/a5l/shuqing.a5l/MobileAgent/UI-S1/checkpoints/Qwen2.5-VL-7B-Instruct
image_max_pixels: 1003520
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
freeze_vision_tower: true
freeze_multi_modal_projector: false
deepspeed: train_GUI_360/llamafactory/ds_z3_config.json

### dataset
dataset: gui360_mixed_train
dataset_dir: train_GUI_360/llamafactory/data
template: qwen2_vl
cutoff_len: 8192
preprocessing_num_workers: 96
dataloader_num_workers: 64

### output
output_dir: train_GUI_360/llamafactory/output/gui360_lora_sft_v4
logging_steps: 10
save_steps: 50
save_total_limit: 5
plot_loss: true
overwrite_output_dir: false
resume_from_checkpoint: train_GUI_360/llamafactory/output/gui360_lora_sft_v4/checkpoint-300
save_only_model: false
report_to: wandb
run_name: gui360_lora_sft_v4

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 1.5e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.1
bf16: true
ddp_timeout: 180000000

### eval
eval_dataset: gui360_mixed_val
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
