# MoE SFT Training Configuration - v1 retrain (2 epochs, save every 50 steps)
# Qwen2.5-VL-7B-Instruct (frozen) + TextOnlyRouter + 6×ExpertLoRA(r=16, q_proj+v_proj)
# top_k=6: all experts participate, router learns weighted combination
# Loss = LM_loss only (no balance loss / z-loss)

# === Base Model ===
model_name_or_path: "checkpoints/Qwen2.5-VL-7B-Instruct"
torch_dtype: "bfloat16"
attn_implementation: "flash_attention_2"

# === MoE Configuration ===
moe:
  num_experts: 6
  top_k: 6
  expert_lora_r: 16
  expert_lora_alpha: 32
  expert_lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
  router_hidden: 256
  router_dropout: 0.1
  router_temperature: 1.0
  pooling_strategy: "mean"
  use_vectorized_routing: true
  balance_weight: 0.0
  balance_type: "mse"
  z_loss_weight: 0.0

# === Training Data ===
data:
  train_file: "train_GUI_360/llamafactory/data/gui360_train.json"
  data_format: "sharegpt"
  max_seq_length: 4096
  image_min_pixels: 256
  image_max_pixels: 1003520

# === Training Hyperparameters ===
training:
  output_dir: "train_GUI_360/moe_sft/output/moe_sft_v1_2ep"
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  # effective batch = 4 nodes * 4 gpus * 1 * 16 = 256
  learning_rate: 5.0e-5
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  max_grad_norm: 0.5
  bf16: true
  gradient_checkpointing: false
  dataloader_num_workers: 4
  logging_steps: 10
  save_steps: 50
  save_total_limit: 20
  seed: 42
  report_to: "wandb"
  run_name: "moe_sft_v1_2ep_save50"

# === DeepSpeed ===
deepspeed: "train_GUI_360/moe_sft/ds_z2_config.json"
